<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校園觀察家：卡方檢定小遊戲</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.4s ease-out forwards;
    }
    /* Hide scrollbar for cleaner table look */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4 font-sans text-gray-800">
  
  <div id="app" class="w-full max-w-3xl flex justify-center">
    <!-- App content will be rendered here by JS -->
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- Firebase Initialization ---
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    // --- Game State ---
    let user = null;
    let currentStep = 0; // 0: Intro, 1-4: Questions, 5: Result
    let score = 0;
    let selectedOption = null;
    let showFeedback = false;
    let nickname = '';
    let leaderboard = [];

    // --- Auth & Firestore Listeners ---
    const initAuth = async () => {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (error) {
        console.error("Auth error:", error);
      }
    };
    initAuth();

    let unsubscribeLeaderboard = null;
    onAuthStateChanged(auth, (currentUser) => {
      user = currentUser;
      if (user) {
        const leaderboardRef = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
        unsubscribeLeaderboard = onSnapshot(
          leaderboardRef,
          (snapshot) => {
            const entries = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            // Memory sort
            entries.sort((a, b) => {
              if (b.score !== a.score) return b.score - a.score;
              return (a.timestamp || 0) - (b.timestamp || 0);
            });
            leaderboard = entries.slice(0, 10);
            if (currentStep > questions.length) renderApp(); // Re-render if on result page
          },
          (error) => console.error("Snapshot error:", error)
        );
      }
    });

    // --- Data ---
    const questions = [
      {
        id: 1,
        title: "情境一：建立假說",
        context: "你注意到班上有些學生每天都有吃早餐，有些則沒有；同時你也觀察到第一節課總是有幾個人在打瞌睡。你想用卡方檢定來探討「吃早餐習慣（每天吃/偶爾吃/不吃）」與「第一節課是否打瞌睡（是/否）」的關聯。",
        question: "進行獨立性卡方檢定時，我們的「虛無假說 (Null Hypothesis, H₀)」應該設定為什麼？",
        options: [
          "A. 吃早餐習慣與打瞌睡有顯著的因果關係。",
          "B. 沒吃早餐的學生比較容易在第一節課打瞌睡。",
          "C. 吃早餐習慣與第一節課是否打瞌睡是互相獨立的（兩者無關）。",
          "D. 吃早餐習慣與第一節課是否打瞌睡有高度相關。"
        ],
        correctAnswer: 2,
        explanation: "卡方獨立性檢定的虛無假說 (H₀) 永遠是假設兩個變數之間「沒有關聯」或「互相獨立」。我們透過檢定來看看是否有足夠的證據推翻這個假設。"
      },
      {
        id: 2,
        title: "情境二：計算期望值",
        context: "為了研究導入「數位學習平台（如 Google Classroom）」是否會影響「作業準時繳交率」，你收集了兩個班級共 100 位學生的數據，列聯表如下：",
        table: {
          headers: ["", "準時交作業", "遲交作業", "總計"],
          rows: [
            ["使用數位平台", "40", "10", "50"],
            ["未使用平台", "20", "30", "50"],
            ["總計", "60", "40", "100"]
          ]
        },
        question: "如果這兩個變數真的是「獨立（無關）」的，那麼「使用數位平台」且「準時交作業」的學生，其『期望值』應該是多少人？",
        options: ["A. 20 人", "B. 30 人", "C. 40 人", "D. 50 人"],
        correctAnswer: 1,
        explanation: "期望值的計算公式是：(列總和 × 欄總和) ÷ 總樣本數。以此題為例，使用平台的總和是 50，準時交的總和是 60，總人數是 100。所以期望值 = (50 × 60) ÷ 100 = 30 人。"
      },
      {
        id: 3,
        title: "情境三：自由度 (Degrees of Freedom)",
        context: "所上的同學正在進行一項研究，觀察學生的「座位區域（前排、中排、後排）」與他們「上課發問的頻率（高、中、低）」是否有關聯。這會形成一個 3x3 的列聯表。",
        question: "請問這個卡方檢定的自由度 (df, Degrees of Freedom) 是多少？",
        options: ["A. 2", "B. 4", "C. 6", "D. 9"],
        correctAnswer: 1,
        explanation: "列聯表卡方檢定的自由度公式為：(列數 - 1) × (欄數 - 1)。這裡座位區域有 3 類，發問頻率也有 3 類。因此 df = (3 - 1) × (3 - 1) = 2 × 2 = 4。"
      },
      {
        id: 4,
        title: "情境四：判讀結果",
        context: "所長想了解不同任教階段（國小、國中、高中老師）對於「AI 融入教學研習」的參加意願（高、低）是否有差異。經過軟體跑完卡方檢定後，得到卡方值 χ² = 11.2，p 值 (p-value) = 0.004。",
        question: "假設我們的顯著水準 (α) 設為 0.05，根據這個 p 值，你能得出什麼結論？",
        options: [
          "A. p < 0.05，拒絕虛無假說，代表任教階段與研習意願「有關聯」。",
          "B. p < 0.05，接受虛無假說，代表任教階段與研習意願「無關」。",
          "C. p 值太小，代表數據蒐集有誤，需要重新做問卷。",
          "D. 國小老師對 AI 融入教學的意願最高。"
        ],
        correctAnswer: 0,
        explanation: "當 p 值小於顯著水準 (0.05) 時，我們有足夠的證據拒絕虛無假說 (H₀: 兩者獨立)。這表示任教階段與研習意願之間存在顯著的關聯性。至於誰的意願最高，需要進一步看殘差分析，單看 p 值無法得知。"
      }
    ];

    const adjectives = ["迷惘的", "認真的", "熬夜的", "熱血的", "頭痛的", "充滿希望的", "卡關的", "神準的", "準時下班的"];
    const nouns = ["菸酒生", "國小老師", "高中老師", "所長", "教授", "研究生", "教務主任", "代理教師", "同學"];

    // --- SVGs Icons Map ---
    const icons = {
      School: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 22v-4a2 2 0 1 0-4 0v4"/><path d="m18 10 4 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-8l4-2"/><path d="M18 5v17"/><path d="m4 6 8-4 8 4"/><path d="M6 5v17"/><circle cx="12" cy="9" r="2"/></svg>`,
      User: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
      Dices: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="12" height="12" x="2" y="10" rx="2" ry="2"/><path d="m17.92 14 3.5-3.5a2.24 2.24 0 0 0 0-3l-5-4.92a2.24 2.24 0 0 0-3 0L10 6"/><path d="M6 18h.01"/><path d="M10 14h.01"/><path d="M15 6h.01"/><path d="M18 9h.01"/></svg>`,
      ChevronRight: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>`,
      BarChart3: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>`,
      CheckCircle2: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>`,
      XCircle: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>`,
      Trophy: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>`,
      GraduationCap: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.42 10.922a2 2 0 0 0-.019-3.838L12.83 4.34a2 2 0 0 0-1.66 0l-8.57 2.744a2 2 0 0 0-.019 3.838l8.57 2.744a2 2 0 0 0 1.66 0z"/><path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/></svg>`,
      RotateCcw: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>`
    };

    function getIcon(name, classes = "") {
      if (!icons[name]) return "";
      return icons[name].replace('<svg ', `<svg class="${classes}" `);
    }

    // --- Actions ---
    window.handleNicknameInput = (val) => {
      nickname = val;
      const btn = document.getElementById('startBtn');
      if(btn) {
        if(!nickname.trim()) {
          btn.disabled = true;
          btn.className = "mt-6 font-bold py-3 px-8 rounded-full shadow-lg transform transition flex items-center mx-auto bg-gray-300 text-gray-500 cursor-not-allowed";
        } else {
          btn.disabled = false;
          btn.className = "mt-6 font-bold py-3 px-8 rounded-full shadow-lg transform transition flex items-center mx-auto bg-blue-600 hover:bg-blue-700 text-white hover:scale-105";
        }
      }
    };

    window.handleGenerateNickname = () => {
      const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
      const noun = nouns[Math.floor(Math.random() * nouns.length)];
      nickname = `${adj}${noun}`;
      const input = document.getElementById('nicknameInput');
      if (input) input.value = nickname;
      window.handleNicknameInput(nickname);
    };

    window.startChallenge = () => {
      if(nickname.trim()) {
        currentStep = 1;
        renderApp();
      }
    };

    window.handleOptionClick = (index) => {
      if (showFeedback) return;
      selectedOption = index;
      showFeedback = true;
      if (index === questions[currentStep - 1].correctAnswer) {
        score++;
      }
      renderApp();
    };

    window.handleNextStep = () => {
      showFeedback = false;
      selectedOption = null;
      
      // 最後一題答完上傳成績
      if (currentStep === questions.length) {
        if (user) {
          const leaderboardRef = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
          addDoc(leaderboardRef, {
            name: nickname,
            score: score,
            userId: user.uid,
            timestamp: Date.now()
          }).catch(e => console.error("Error adding score:", e));
        }
      }
      
      currentStep++;
      renderApp();
    };

    window.resetGame = () => {
      currentStep = 0;
      score = 0;
      selectedOption = null;
      showFeedback = false;
      nickname = '';
      renderApp();
    };

    // --- Renderers ---
    function renderIntro() {
      const btnDisabledClass = !nickname.trim() ? 'bg-gray-300 text-gray-500 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 text-white hover:scale-105';
      const isBtnDisabled = !nickname.trim() ? 'disabled' : '';

      return `
        <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8 max-w-2xl w-full mx-auto text-center space-y-6 animate-fade-in-up">
          <div class="flex justify-center mb-4">
            ${getIcon('School', 'w-16 h-16 sm:w-20 sm:h-20 text-blue-600')}
          </div>
          <h1 class="text-2xl sm:text-3xl font-bold text-gray-800">校園觀察家：卡方檢定挑戰</h1>
          <p class="text-base sm:text-lg text-gray-600 text-left">
            各位數位學習所的老師、同學們好！在我們的教學日常與量化研究中，經常需要探討兩個類別變數是否相關（例如：用平板學習是否影響成績？吃早餐是否影響專注度？）。
          </p>
          
          <div class="bg-blue-50 p-5 rounded-xl mt-6">
            <label class="block text-gray-700 font-bold mb-3 text-lg">請輸入你的玩家暱稱：</label>
            <div class="flex flex-col sm:flex-row gap-3 justify-center items-center">
              <div class="relative w-full sm:w-64">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  ${getIcon('User', 'h-5 w-5 text-gray-400')}
                </div>
                <input
                  id="nicknameInput"
                  type="text"
                  value="${nickname}"
                  oninput="window.handleNicknameInput(this.value)"
                  placeholder="例如：熱血國小老師"
                  class="pl-10 w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                />
              </div>
              <button
                onclick="window.handleGenerateNickname()"
                class="w-full sm:w-auto flex items-center justify-center gap-2 bg-indigo-100 hover:bg-indigo-200 text-indigo-700 font-semibold py-3 px-4 rounded-lg transition"
              >
                ${getIcon('Dices', 'w-5 h-5')} 隨機生成
              </button>
            </div>
          </div>

          <button
            id="startBtn"
            onclick="window.startChallenge()"
            ${isBtnDisabled}
            class="mt-6 font-bold py-3 px-8 rounded-full shadow-lg transform transition flex items-center mx-auto ${btnDisabledClass}"
          >
            開始挑戰 ${getIcon('ChevronRight', 'ml-2 w-5 h-5')}
          </button>
        </div>
      `;
    }

    function renderQuestion() {
      const q = questions[currentStep - 1];
      const isAnswered = showFeedback;

      let tableHTML = "";
      if (q.table) {
        tableHTML = `
          <div class="overflow-x-auto my-3 sm:my-4 no-scrollbar">
            <table class="w-full text-center border-collapse border border-gray-300 min-w-[300px]">
              <thead>
                <tr class="bg-gray-100 text-sm sm:text-base">
                  ${q.table.headers.map(th => `<th class="border border-gray-300 p-1 sm:p-2 font-semibold text-gray-700">${th}</th>`).join('')}
                </tr>
              </thead>
              <tbody class="text-sm sm:text-base">
                ${q.table.rows.map((row, i) => {
                  const isLast = i === q.table.rows.length - 1;
                  return `
                    <tr class="${isLast ? 'bg-gray-50 font-bold' : ''}">
                      ${row.map((cell, j) => `<td class="border border-gray-300 p-1 sm:p-2 ${j === 0 ? 'bg-gray-100 font-semibold whitespace-nowrap' : ''}">${cell}</td>`).join('')}
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        `;
      }

      const optionsHTML = q.options.map((option, index) => {
        let buttonClass = "w-full text-left p-3 sm:p-4 rounded-xl border-2 transition-all duration-200 text-base sm:text-lg ";
        let iconHTML = "";
        
        if (!isAnswered) {
          buttonClass += "border-gray-200 hover:border-blue-400 hover:bg-blue-50 cursor-pointer active:bg-blue-100";
        } else {
          if (index === q.correctAnswer) {
            buttonClass += "border-green-500 bg-green-50 text-green-800 font-medium";
            iconHTML = getIcon('CheckCircle2', 'text-green-500 w-5 h-5 sm:w-6 sm:h-6 flex-shrink-0 ml-2');
          } else if (index === selectedOption) {
            buttonClass += "border-red-400 bg-red-50 text-red-700";
            iconHTML = getIcon('XCircle', 'text-red-500 w-5 h-5 sm:w-6 sm:h-6 flex-shrink-0 ml-2');
          } else {
            buttonClass += "border-gray-200 opacity-50 cursor-not-allowed";
          }
        }

        return `
          <button
            onclick="window.handleOptionClick(${index})"
            ${isAnswered ? 'disabled' : ''}
            class="${buttonClass}"
          >
            <div class="flex items-center justify-between">
              <span>${option}</span>
              ${iconHTML}
            </div>
          </button>
        `;
      }).join('');

      let feedbackHTML = "";
      if (showFeedback) {
        const isCorrect = selectedOption === q.correctAnswer;
        feedbackHTML = `
          <div class="mt-4 sm:mt-6 p-4 sm:p-5 rounded-xl border-l-4 animate-fade-in-up ${isCorrect ? 'bg-green-100 border-green-500' : 'bg-red-100 border-red-500'}">
            <h3 class="font-bold text-base sm:text-lg mb-2 ${isCorrect ? 'text-green-800' : 'text-red-800'}">
              ${isCorrect ? '🎉 答對了！' : '💡 差一點點！'}
            </h3>
            <p class="text-sm sm:text-base text-gray-700 leading-relaxed">${q.explanation}</p>
            <button
              onclick="window.handleNextStep()"
              class="mt-4 bg-gray-800 hover:bg-gray-900 text-white font-semibold py-2 px-6 rounded-lg transition shadow flex items-center ml-auto active:scale-95"
            >
              ${currentStep === questions.length ? '看結果' : '下一題'} ${getIcon('ChevronRight', 'w-4 h-4 sm:w-5 sm:h-5 ml-1')}
            </button>
          </div>
        `;
      }

      return `
        <div class="bg-white rounded-2xl shadow-xl p-5 sm:p-8 max-w-3xl w-full mx-auto space-y-4 sm:space-y-6 animate-fade-in-up">
          <div class="flex justify-between items-center text-xs sm:text-sm font-semibold text-gray-500 mb-2">
            <span class="flex items-center">${getIcon('BarChart3', 'w-4 h-4 mr-1')} 題目 ${currentStep} / ${questions.length}</span>
            <span>目前得分: ${score}</span>
          </div>
          
          <div class="w-full bg-gray-200 rounded-full h-2 sm:h-2.5 mb-4 sm:mb-6">
            <div class="bg-blue-600 h-2 sm:h-2.5 rounded-full transition-all duration-500" style="width: ${(currentStep / questions.length) * 100}%"></div>
          </div>

          <h2 class="text-xl sm:text-2xl font-bold text-blue-800 border-b-2 border-blue-100 pb-2">${q.title}</h2>
          
          <div class="bg-blue-50 p-3 sm:p-4 rounded-lg text-gray-700 text-base sm:text-lg leading-relaxed">
            ${q.context}
          </div>

          ${tableHTML}

          <p class="text-lg sm:text-xl font-bold text-gray-800 mt-2 sm:mt-4">${q.question}</p>

          <div class="space-y-2 sm:space-y-3 mt-4 sm:mt-6">
            ${optionsHTML}
          </div>

          ${feedbackHTML}
        </div>
      `;
    }

    function renderResult() {
      let message = "";
      let topIcon = "";
      if (score === 4) {
        message = "太強了！你就是傳說中的「卡方戰士」！你的觀念非常清晰，論文發表沒問題啦！🏆";
        topIcon = getIcon('Trophy', 'w-20 h-20 sm:w-24 sm:h-24 text-yellow-500');
      } else if (score >= 2) {
        message = "表現不錯喔！已經掌握了大部分的核心概念，再稍微複習一下就完美了！📚";
        topIcon = getIcon('GraduationCap', 'w-20 h-20 sm:w-24 sm:h-24 text-blue-600');
      } else {
        message = "沒關係，統計學本來就需要多一點時間消化。這些都是很好的複習素材，再挑戰一次吧！💪";
        topIcon = getIcon('GraduationCap', 'w-20 h-20 sm:w-24 sm:h-24 text-blue-600');
      }

      let leaderboardHTML = leaderboard.map((entry, idx) => {
        const isMe = user && entry.userId === user.uid;
        let rankClass = "";
        if (idx === 0) rankClass = "text-yellow-400 text-xl";
        else if (idx === 1) rankClass = "text-gray-400 text-lg";
        else if (idx === 2) rankClass = "text-amber-600 text-lg";

        const bgClass = isMe ? 'bg-blue-600 text-white shadow-md transform scale-105' : 'bg-white text-gray-700 border border-gray-200';
        return `
          <div class="flex justify-between items-center p-3 rounded-lg transition-all ${bgClass}">
            <div class="flex items-center gap-2 sm:gap-3">
              <span class="font-bold w-6 text-center ${rankClass}">${idx + 1}</span>
              <span class="font-semibold text-sm sm:text-base line-clamp-1">${entry.name} ${isMe ? '(你)' : ''}</span>
            </div>
            <span class="font-bold text-sm sm:text-base whitespace-nowrap">${entry.score} 分</span>
          </div>
        `;
      }).join('');

      if (leaderboard.length === 0) {
        leaderboardHTML = `<p class="text-center text-gray-500 py-4">目前還沒有人挑戰，搶下第一名吧！</p>`;
      }

      return `
        <div class="bg-white rounded-2xl shadow-xl p-5 sm:p-8 max-w-md sm:max-w-2xl w-full mx-auto text-center space-y-6 animate-fade-in-up">
          <div class="flex justify-center mb-4">
            ${topIcon}
          </div>
          <h1 class="text-3xl sm:text-4xl font-extrabold text-gray-800">挑戰完成！</h1>
          <div class="text-5xl sm:text-6xl font-black text-blue-600 my-4 sm:my-6">
            ${score} <span class="text-xl sm:text-2xl text-gray-500 font-medium">/ 4</span>
          </div>
          <p class="text-base sm:text-xl text-gray-700 bg-gray-50 p-4 rounded-lg">${message}</p>
          
          <div class="mt-6 sm:mt-8 bg-indigo-50 rounded-xl p-4 sm:p-6 text-left">
            <h3 class="text-lg sm:text-xl font-bold text-indigo-900 mb-4 flex items-center justify-center sm:justify-start">
              ${getIcon('BarChart3', 'mr-2 w-6 h-6')} 研究所學習排行榜 (Top 10)
            </h3>
            <div class="space-y-2">
              ${leaderboardHTML}
            </div>
          </div>

          <div class="mt-8 pt-2">
            <button
              onclick="window.resetGame()"
              class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transform transition hover:scale-105 flex items-center mx-auto"
            >
              ${getIcon('RotateCcw', 'mr-2 w-5 h-5')} 再玩一次
            </button>
          </div>
        </div>
      `;
    }

    // --- Main Render Logic ---
    function renderApp() {
      const appDiv = document.getElementById('app');
      if (currentStep === 0) {
        appDiv.innerHTML = renderIntro();
      } else if (currentStep > 0 && currentStep <= questions.length) {
        appDiv.innerHTML = renderQuestion();
      } else {
        appDiv.innerHTML = renderResult();
      }
    }

    // Initial render
    renderApp();
  </script>
</body>
</html>
